<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f6;--card:#fff;--fg:#1a1a2e;--mute:#6a6a8a;
  --border:#e0ddd6;--accent:#2d9f8b;--accent-soft:#e6f5f1;--btn-bg:#f4f3ef;
  --radius:12px
}
body{
  background:var(--bg);min-height:100dvh;color:var(--fg);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;
  overscroll-behavior:none;padding:16px;gap:12px
}
.game-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:clamp(14px,3vw,20px);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  width:100%;max-width:440px
}
.top{width:100%;display:flex;justify-content:space-between;align-items:center}
.top h1{
  font-size:clamp(17px,4vw,20px);font-weight:600;letter-spacing:-.02em;
  color:var(--accent)
}
.score{
  background:var(--btn-bg);border-radius:8px;
  padding:clamp(3px,1vw,6px) clamp(10px,2.5vw,14px);
  font-size:clamp(13px,3vw,15px);font-weight:500;white-space:nowrap
}
.score span{color:var(--accent);font-weight:600}
.cw{position:relative;width:100%;max-width:400px;aspect-ratio:1/1}
canvas{
  background:var(--btn-bg);border-radius:clamp(6px,1.5vw,10px);
  display:block;width:100%;height:100%;
  image-rendering:pixelated;touch-action:none;cursor:pointer
}
.bar{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px}
.bar button{
  background:var(--btn-bg);color:var(--fg);border:1px solid var(--border);
  padding:clamp(6px,1.5vw,8px) clamp(10px,2.5vw,16px);border-radius:8px;
  font-size:clamp(12px,2.5vw,13px);font-weight:500;cursor:pointer;
  transition:background .15s;-webkit-tap-highlight-color:transparent
}
.bar button:active{background:var(--border)}
.bar .hint{font-size:12px;color:var(--mute);display:none}
.ov{
  position:absolute;inset:0;z-index:2;border-radius:clamp(6px,1.5vw,10px);
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;gap:clamp(8px,2vw,12px);background:rgba(255,255,255,.8);
  pointer-events:auto
}
.ov.h{display:none;pointer-events:none}
.ov .t{font-size:clamp(22px,6vw,28px);font-weight:600;color:var(--fg)}
.ov .s{font-size:clamp(13px,3vw,14px);color:var(--mute)}
.ov button{
  background:var(--accent);color:#fff;border:none;
  padding:clamp(8px,2vw,10px) clamp(18px,4vw,26px);border-radius:8px;
  font-size:clamp(14px,3vw,15px);font-weight:500;cursor:pointer;
  transition:background .15s;-webkit-tap-highlight-color:transparent
}
.ov button:active{background:#268575}
.dpad{
  display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:clamp(4px,1vw,6px);max-width:180px;width:100%;aspect-ratio:3/3;
  user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none
}
.dpad-btn{
  background:var(--btn-bg);border:1px solid var(--border);
  border-radius:clamp(8px,2vw,10px);color:var(--mute);
  font-size:clamp(18px,5vw,24px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:none
}
.dpad-btn:active{background:var(--border);color:var(--accent)}
.dpad-e{visibility:hidden}
.cr{width:100%;display:flex;justify-content:center}
@media(hover:hover){
  .bar button:hover{border-color:var(--accent)}
  .dpad-btn:hover{border-color:var(--accent)}
}
@media(min-width:600px){.dpad{display:none}.bar .hint{display:inline}}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="top">
    <h1>🐍 贪吃蛇</h1>
    <div class="score">分数 <span id="sc">0</span></div>
  </div>
  <div class="cw">
    <canvas id="c" width="400" height="400"></canvas>
    <div class="ov" id="ov">
      <div class="t" id="ot">🐍 贪吃蛇</div>
      <div class="s" id="os">点击按钮或滑动开始</div>
      <button id="ob">开始游戏</button>
    </div>
  </div>
  <div class="cr">
    <div class="dpad">
      <div class="dpad-e"></div><button class="dpad-btn" data-d="u">▲</button><div class="dpad-e"></div>
      <button class="dpad-btn" data-d="l">◀</button><div class="dpad-e"></div><button class="dpad-btn" data-d="r">▶</button>
      <div class="dpad-e"></div><button class="dpad-btn" data-d="d">▼</button><div class="dpad-e"></div>
    </div>
  </div>
  <div class="bar">
    <button id="rb">↻ 重新开始</button>
    <span class="hint">键盘 ↑↓←→ / WASD</span>
  </div>
</div>
<script>
(function(){
  const c=document.getElementById('c'),cx=c.getContext('2d');
  const se=document.getElementById('sc'),ov=document.getElementById('ov');
  const ot=document.getElementById('ot'),os=document.getElementById('os');
  const ob=document.getElementById('ob'),rb=document.getElementById('rb');
  const db=document.querySelectorAll('.dpad-btn[data-d]');
  const G=20,S=400,CS=S/G,TI=150;
  let sn,fd,di,nd,sc,go,wn,pa,ti;

  function i(){
    sn=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    di='r';nd='r';sc=0;go=false;wn=false;pa=true;
    se.textContent='0';f();
    ot.textContent='🐍 贪吃蛇';os.textContent='点击按钮或滑动开始';
    ov.classList.remove('h');ob.textContent='开始游戏';
  }
  function f(){
    const o=new Set(sn.map(p=>`${p.x},${p.y}`)),fr=[];
    for(let i=0;i<G;i++)for(let j=0;j<G;j++)if(!o.has(`${i},${j}`))fr.push({x:i,y:j});
    if(!fr.length){wn=true;go=true;return}
    fd=fr[Math.floor(Math.random()*fr.length)];
  }
  function scn(){
    const r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;
    const w=r.width*d,h=r.height*d;
    if(c.width!==w||c.height!==h){c.width=w;c.height=h;cx.setTransform(w/S,0,0,h/S,0,0)}
  }
  const GG=(x,y,r)=>{cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill()};
  function d(){
    scn();cx.clearRect(0,0,S,S);
    cx.strokeStyle='#e0ddd6';cx.lineWidth=.5;
    for(let i=0;i<=G;i++){
      cx.beginPath();cx.moveTo(i*CS,0);cx.lineTo(i*CS,S);cx.stroke();
      cx.beginPath();cx.moveTo(0,i*CS);cx.lineTo(S,i*CS);cx.stroke();
    }
    sn.forEach((e,i)=>{
      const r=1-i/sn.length*.4;
      cx.fillStyle=`rgb(0,${Math.round(170*r+20)},${Math.round(180*r+40)})`;
      const p=i===0?0:2,rr=i===0?4:2.5;
      rx(e.x*CS+p/2,e.y*CS+p/2,CS-p,CS-p,rr);
    });
    const h=sn[0],sx=h.x*CS,sy=h.y*CS;
    cx.fillStyle='#fff';
    if(di==='r'){cx.fillRect(sx+13,sy+5,3,3);cx.fillRect(sx+13,sy+12,3,3);}
    else if(di==='l'){cx.fillRect(sx+4,sy+5,3,3);cx.fillRect(sx+4,sy+12,3,3);}
    else if(di==='u'){cx.fillRect(sx+5,sy+4,3,3);cx.fillRect(sx+12,sy+4,3,3);}
    else{cx.fillRect(sx+5,sy+13,3,3);cx.fillRect(sx+12,sy+13,3,3);}
    const p=Math.sin(Date.now()/200)*.1+.9;
    cx.save();cx.translate(fd.x*CS+10,fd.y*CS+10);cx.scale(p,p);
    cx.fillStyle='#e85d75';cx.shadowColor='#e85d75';cx.shadowBlur=6;
    cx.beginPath();cx.arc(0,0,8,0,Math.PI*2);cx.fill();cx.restore();
  }
  function rx(xx,yy,w,h,r){
    cx.beginPath();cx.moveTo(xx+r,yy);cx.lineTo(xx+w-r,yy);cx.quadraticCurveTo(xx+w,yy,xx+w,yy+r);
    cx.lineTo(xx+w,yy+h-r);cx.quadraticCurveTo(xx+w,yy+h,xx+w-r,yy+h);
    cx.lineTo(xx+r,yy+h);cx.quadraticCurveTo(xx,yy+h,xx,yy+h-r);
    cx.lineTo(xx,yy+r);cx.quadraticCurveTo(xx,yy,xx+r,yy);
    cx.closePath();cx.fill();
  }
  function t(){
    if(go||pa)return;
    di=nd;const h={x:sn[0].x,y:sn[0].y};
    if(di==='u')h.y--;else if(di==='d')h.y++;else if(di==='l')h.x--;else h.x++;
    if(h.x<0||h.x>=G||h.y<0||h.y>=G){eg('撞墙了...');return}
    if(sn.some(e=>e.x===h.x&&e.y===h.y)){eg('咬到自己了');return}
    sn.unshift(h);
    if(h.x===fd.x&&h.y===fd.y){sc++;se.textContent=sc;f();if(wn){eg('你赢了！🎉',1);return}}
    else sn.pop();
    d();
  }
  function eg(m,w){
    go=1;clearInterval(ti);
    ot.textContent=w?'🎉 恭喜通关！':'💀 游戏结束';
    os.textContent=m+` 得分：${sc}`;
    ov.classList.remove('h');ob.textContent='再来一局';d();
  }
  function st(){
    clearInterval(ti);i();d();pa=0;ov.classList.add('h');ti=setInterval(t,TI);
  }
  function sd(d){
    const o={u:'d',d:'u',l:'r',r:'l'};
    if(d!==o[di])nd=d;if(pa&&!go)st();
  }
  document.addEventListener('keydown',e=>{
    const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',
      w:'u',s:'d',a:'l',d:'r',W:'u',S:'d',A:'l',D:'r'};
    if(m[e.key]){e.preventDefault();sd(m[e.key])}
  });
  db.forEach(b=>{b.addEventListener('pointerdown',e=>{e.preventDefault();sd(b.dataset.d)})});
  let ts=null;
  const ts1=e=>{const t=e.touches[0];ts={x:t.clientX,y:t.clientY}};
  const ts2=e=>{
    if(!ts)return;const t=e.changedTouches[0],dx=t.clientX-ts.x,dy=t.clientY-ts.y;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>15)sd(dx>0?'r':'l');
    else if(Math.abs(dy)>15)sd(dy>0?'d':'u');ts=null;
  };
  c.addEventListener('touchstart',ts1,{passive:1});c.addEventListener('touchend',ts2,{passive:1});
  window.addEventListener('resize',scn);
  ob.addEventListener('pointerdown',e=>e.preventDefault());
  ob.addEventListener('click',st);
  rb.addEventListener('pointerdown',e=>e.preventDefault());
  rb.addEventListener('click',()=>{clearInterval(ti);i();d();pa=1;
    ov.classList.remove('h');ot.textContent='🐍 贪吃蛇';
    os.textContent='点击按钮或滑动开始';ob.textContent='开始游戏'});
  function pl(){if(!go)d();requestAnimationFrame(pl)}
  i();scn();d();pl();
})();
</script>
</body>
</html>
