<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 — Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
    color: #e0e0e0;
  }
  .game-container {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #00d4aa, #00b4d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-box {
    background: #16213e;
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
  }
  .score-box span { color: #00d4aa; }
  canvas {
    background: #0a0a1a;
    border-radius: 10px;
    display: block;
    width: 400px;
    height: 400px;
    image-rendering: pixelated;
    cursor: pointer;
  }
  .controls {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .controls button {
    background: #16213e;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .controls button:hover { background: #1e2a50; border-color: #00d4aa; }
  .controls .hint {
    font-size: 12px;
    color: #6a6a8a;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.65);
    border-radius: 10px;
    pointer-events: auto;
  }
  #overlay.hidden { display: none; pointer-events: none; }
  #overlay .title {
    font-size: 28px;
    font-weight: 700;
  }
  #overlay .sub {
    font-size: 15px;
    color: #9a9ab0;
  }
  #overlay button {
    background: #00d4aa;
    color: #0a0a1a;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s, transform 0.1s;
  }
  #overlay button:hover { background: #00e6b5; transform: scale(1.03); }
  .canvas-wrapper {
    position: relative;
    width: 400px;
    height: 400px;
  }
  @media (max-width: 480px) {
    .game-container { padding: 16px; border-radius: 12px; }
    canvas, .canvas-wrapper { width: 320px; height: 320px; }
    .header h1 { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-box">分数 <span id="score">0</span></div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay">
      <div class="title" id="overlay-title">贪吃蛇</div>
      <div class="sub" id="overlay-sub">按方向键开始</div>
      <button id="overlay-btn">开始游戏</button>
    </div>
  </div>
  <div class="controls">
    <button id="restart-btn">↻ 重新开始</button>
    <span class="hint">↑↓←→ / WASD</span>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub = document.getElementById('overlay-sub');
  const overlayBtn = document.getElementById('overlay-btn');
  const restartBtn = document.getElementById('restart-btn');

  // ---------- constants ----------
  const GRID_SIZE = 20;       // 20x20 grid
  const CELL_SIZE = 20;       // pixels (canvas is 400x400)
  const TICK_INTERVAL = 150;  // ms per move

  // ---------- state ----------
  let snake, food, dir, nextDir, score, gameOver, won, paused, timer;

  function initState() {
    snake = [
      {x: 10, y: 10},
      {x:  9, y: 10},
      {x:  8, y: 10},
    ];
    dir = 'right'; nextDir = 'right';
    score = 0;
    gameOver = false;
    won = false;
    paused = true;
    scoreEl.textContent = '0';
    spawnFood();
    overlayTitle.textContent = '🐍 贪吃蛇';
    overlaySub.textContent = '按方向键或点击按钮开始';
    overlay.classList.remove('hidden');
    overlayBtn.textContent = '开始游戏';
  }

  function spawnFood() {
    const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
    const free = [];
    for (let i = 0; i < GRID_SIZE; i++)
      for (let j = 0; j < GRID_SIZE; j++)
        if (!occupied.has(`${i},${j}`)) free.push({x: i, y: j});
    if (free.length === 0) { won = true; gameOver = true; return; }
    food = free[Math.floor(Math.random() * free.length)];
  }

  // ---------- drawing ----------
  function draw() {
    ctx.clearRect(0, 0, 400, 400);

    // grid lines (subdued)
    ctx.strokeStyle = '#16162a';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, 400);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(400, i * CELL_SIZE);
      ctx.stroke();
    }

    // snake body
    snake.forEach((seg, i) => {
      const ratio = 1 - i / snake.length * 0.4;
      const g = Math.round(180 * ratio);
      const b = Math.round(200 * ratio + 55);
      ctx.fillStyle = `rgb(0, ${g}, ${b})`;
      const pad = i === 0 ? 0 : 2;
      const r = i === 0 ? 4 : 3;
      roundRect(ctx, seg.x * CELL_SIZE + pad/2, seg.y * CELL_SIZE + pad/2,
                CELL_SIZE - pad, CELL_SIZE - pad, r);
    });

    // snake head eyes
    const head = snake[0];
    ctx.fillStyle = '#fff';
    const eyeOff = 4;
    if (dir === 'right') {
      ctx.fillRect(head.x * CELL_SIZE + 13, head.y * CELL_SIZE + 5, 3, 3);
      ctx.fillRect(head.x * CELL_SIZE + 13, head.y * CELL_SIZE + 12, 3, 3);
    } else if (dir === 'left') {
      ctx.fillRect(head.x * CELL_SIZE + 4, head.y * CELL_SIZE + 5, 3, 3);
      ctx.fillRect(head.x * CELL_SIZE + 4, head.y * CELL_SIZE + 12, 3, 3);
    } else if (dir === 'up') {
      ctx.fillRect(head.x * CELL_SIZE + 5,  head.y * CELL_SIZE + 4, 3, 3);
      ctx.fillRect(head.x * CELL_SIZE + 12, head.y * CELL_SIZE + 4, 3, 3);
    } else {
      ctx.fillRect(head.x * CELL_SIZE + 5,  head.y * CELL_SIZE + 13, 3, 3);
      ctx.fillRect(head.x * CELL_SIZE + 12, head.y * CELL_SIZE + 13, 3, 3);
    }

    // food
    const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
    ctx.save();
    ctx.translate(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ff3b5c';
    ctx.shadowColor = '#ff3b5c';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(0, 0, CELL_SIZE/2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x - r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  // ---------- game logic ----------
  function tick() {
    if (gameOver || paused) return;

    dir = nextDir;
    const head = {x: snake[0].x, y: snake[0].y};
    switch (dir) {
      case 'up':    head.y--; break;
      case 'down':  head.y++; break;
      case 'left':  head.x--; break;
      case 'right': head.x++; break;
    }

    // wall collision
    if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
      endGame('撞墙了...');
      return;
    }

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame('咬到自己了');
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      spawnFood();
      if (won) {
        endGame('你赢了！🎉', true);
        return;
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame(msg, isWin = false) {
    gameOver = true;
    clearInterval(timer);
    overlayTitle.textContent = isWin ? '🎉 恭喜通关！' : '💀 游戏结束';
    overlaySub.textContent = msg + `  得分：${score}`;
    overlay.classList.remove('hidden');
    overlayBtn.textContent = '再来一局';
    draw();
  }

  function startGame() {
    clearInterval(timer);
    initState();
    draw();
    paused = false;
    overlay.classList.add('hidden');
    timer = setInterval(tick, TICK_INTERVAL);
  }

  // ---------- input ----------
  function setDirection(d) {
    const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
    if (d !== opposites[dir]) nextDir = d;
    if (paused && !gameOver) startGame();
  }

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      W: 'up', S: 'down', A: 'left', D: 'right',
    };
    const d = map[e.key];
    if (d) { e.preventDefault(); setDirection(d); }
  });

  // touch / swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  }, {passive: true});
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const minSwipe = 20;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe)
      setDirection(dx > 0 ? 'right' : 'left');
    else if (Math.abs(dy) > minSwipe)
      setDirection(dy > 0 ? 'down' : 'up');
    touchStart = null;
  }, {passive: true});

  // buttons
  overlayBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', () => {
    clearInterval(timer);
    initState();
    draw();
    if (overlay.classList.contains('hidden')) {
      overlay.classList.remove('hidden');
      overlayTitle.textContent = '🐍 贪吃蛇';
      overlaySub.textContent = '按方向键或点击按钮开始';
      overlayBtn.textContent = '开始游戏';
    }
    paused = true;
  });

  // animation loop for food pulse
  function pulseLoop() {
    if (!gameOver && !paused) draw();
    requestAnimationFrame(pulseLoop);
  }

  // ---------- boot ----------
  initState();
  draw();
  pulseLoop();
})();
</script>
</body>
</html>
