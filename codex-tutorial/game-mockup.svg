<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="20"/>

  <!-- Glass container -->
  <rect x="120" y="20" width="560" height="460" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="65" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="system-ui" letter-spacing="2">✦ 记忆翻牌 ✦</text>
  <text x="400" y="85" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="system-ui">Codex 构建的简约小游戏</text>

  <!-- Stats bar -->
  <rect x="160" y="105" width="130" height="42" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="225" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="system-ui">步数</text>
  <text x="225" y="140" text-anchor="middle" fill="white" font-size="17" font-weight="600" font-family="system-ui">12</text>

  <rect x="310" y="105" width="130" height="42" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="375" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="system-ui">用时</text>
  <text x="375" y="140" text-anchor="middle" fill="white" font-size="17" font-weight="600" font-family="system-ui">00:32</text>

  <rect x="460" y="105" width="130" height="42" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="525" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="system-ui">配对</text>
  <text x="525" y="140" text-anchor="middle" fill="white" font-size="17" font-weight="600" font-family="system-ui">4 / 8</text>

  <!-- Game cards -->
  <!-- Row 1: Matched pair (dog) -->
  <rect x="165" y="170" width="70" height="70" rx="12" fill="rgba(167,243,208,0.9)" stroke="#6ee7b7" stroke-width="2"/>
  <text x="200" y="216" text-anchor="middle" font-size="28">🐶</text>

  <rect x="255" y="170" width="70" height="70" rx="12" fill="rgba(167,243,208,0.9)" stroke="#6ee7b7" stroke-width="2"/>
  <text x="290" y="216" text-anchor="middle" font-size="28">🐶</text>

  <!-- Row 1: Two face-down cards -->
  <rect x="345" y="170" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="380" y="216" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="435" y="170" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="470" y="216" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <!-- Row 1: Matched pair (cat) -->
  <rect x="525" y="170" width="70" height="70" rx="12" fill="rgba(167,243,208,0.9)" stroke="#6ee7b7" stroke-width="2"/>
  <text x="560" y="216" text-anchor="middle" font-size="28">🐱</text>

  <!-- Row 2: Face-down cards -->
  <rect x="165" y="255" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="200" y="301" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="255" y="255" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="290" y="301" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <!-- Row 2: Two face-up (currently flipping) -->
  <rect x="345" y="255" width="70" height="70" rx="12" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="380" y="301" text-anchor="middle" font-size="28">🐸</text>

  <rect x="435" y="255" width="70" height="70" rx="12" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="470" y="301" text-anchor="middle" font-size="28">🦊</text>

  <!-- Row 2: Face-down cards -->
  <rect x="525" y="255" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="560" y="301" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <!-- Row 3: Face-down cards -->
  <rect x="165" y="340" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="200" y="386" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="255" y="340" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="290" y="386" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="345" y="340" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="380" y="386" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="435" y="340" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="470" y="386" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <rect x="525" y="340" width="70" height="70" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="560" y="386" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="24" font-weight="300">?</text>

  <!-- Button -->
  <rect x="320" y="430" width="160" height="36" rx="12" fill="url(#btn)" filter="url(#glow)"/>
  <text x="400" y="453" text-anchor="middle" fill="white" font-size="13" font-weight="600" font-family="system-ui">🔄 重新开始</text>

  <!-- Codex watermark -->
  <text x="400" y="488" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="system-ui">Codex + DeepSeek</text>
</svg>